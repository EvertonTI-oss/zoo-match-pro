<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoo Match: World Record Edition</title>
    <style>
        :root { 
            --primary: #FF4757; --secondary: #2ED573; --accent: #1E90FF;
            --bg: #0F172A; --card-back: #1E293B; --gold: #FFD32A;
        }

        body { 
            font-family: 'Outfit', 'Segoe UI', sans-serif; background: var(--bg); 
            margin: 0; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; color: white;
        }

        /* --- BACKGROUND --- */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .overlay { position: absolute; inset: 0; background: linear-gradient(45deg, rgba(255,71,87,0.15), rgba(30,144,255,0.15)); }

        /* --- MENU LATERAL --- */
        #side-menu {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px);
            z-index: 1000; transform: translateX(-100%); transition: transform 0.4s ease;
            padding: 30px; box-sizing: border-box; border-right: 3px solid var(--accent);
        }
        #side-menu.open { transform: translateX(0); }
        .menu-btn-open {
            position: fixed; top: 20px; left: 20px; z-index: 500;
            background: var(--accent); border: none; color: white;
            width: 50px; height: 50px; border-radius: 15px; cursor: pointer; font-size: 1.5rem;
        }

        /* --- RANKING MODAL --- */
        #ranking-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .ranking-box {
            background: var(--card-back); padding: 30px; border-radius: 30px;
            width: 85%; max-width: 400px; text-align: center; border: 2px solid var(--gold);
        }
        .ranking-list { width: 100%; margin-top: 20px; text-align: left; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* --- TELAS E GLASSMORPHISM --- */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 40px; width: 90%; max-width: 380px; text-align: center;
        }

        /* --- BOTÕES --- */
        .btn { 
            padding: 16px; font-size: 1rem; font-weight: 800; border: none; 
            border-radius: 20px; cursor: pointer; transition: 0.3s; 
            width: 100%; margin-bottom: 12px; color: white; text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* --- JOGO --- */
        .game-container { display: none; width: 100%; z-index: 5; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; gap: 8px; padding: 10px; width: 95%; max-width: 550px; }
        .card { aspect-ratio: 1/1; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-size: 2rem; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .card-front { background: #fff; transform: rotateY(180deg); color: #333; border: 3px solid var(--secondary); }
        .card-back { background: var(--card-back); color: var(--accent); font-size: 1.5rem; }

        .stat-bar { background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 50px; display: flex; gap: 20px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <button class="menu-btn-open" onclick="toggleMenu()">☰</button>

    <div id="side-menu">
        <button style="background:none; border:none; color:white; font-size:2rem;" onclick="toggleMenu()">×</button>
        <div style="margin-top:40px; display:flex; flex-direction:column; gap:15px;">
            <div class="btn" style="background:var(--accent)" onclick="location.reload()">🏠 Tela Inicial</div>
            <div class="btn" style="background:var(--gold); color:#000" onclick="showRanking()">🏆 Ver Ranking</div>
            <div class="btn" style="background:var(--secondary)" onclick="toggleMenu(); showDifficulty();">🎮 Novo Jogo</div>
        </div>
    </div>

    <div id="ranking-screen" onclick="this.style.display='none'">
        <div class="ranking-box" onclick="event.stopPropagation()">
            <h2 style="color:var(--gold)">🏆 RECORDES</h2>
            <div id="ranking-content" class="ranking-list"></div>
            <button class="btn" style="background:var(--primary); margin-top:20px;" onclick="document.getElementById('ranking-screen').style.display='none'">FECHAR</button>
        </div>
    </div>

    <div class="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-white-lion-in-a-nature-reserve-4105-large.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div id="splash-screen" class="screen">
        <div class="glass-panel">
            <h1 style="font-size: 3rem; margin: 0; color: var(--gold);">ZOO MATCH</h1>
            <input type="text" id="player-name" placeholder="Seu apelido..." style="padding:15px; border-radius:15px; width:80%; border:none; margin: 20px 0; text-align: center; font-size: 1.1rem;">
            <button class="btn" style="background: var(--accent);" onclick="showDifficulty()">JOGAR!</button>
        </div>
    </div>

    <div id="difficulty-screen" class="screen" style="display: none;">
        <div class="glass-panel">
            <h2>NÍVEL:</h2>
            <button class="btn" style="background:var(--secondary)" onclick="setupGame(6, 'Explorador')">🐾 Explorador</button>
            <button class="btn" style="background:var(--accent)" onclick="setupGame(10, 'Guardião')">🐯 Guardião</button>
            <button class="btn" style="background:var(--primary)" onclick="setupGame(15, 'Mestre')">🦁 Mestre</button>
            <button class="btn" style="background:#000; border: 2px solid var(--gold); color: var(--gold);" onclick="setupGame(21, 'Lenda', true)">💀 LENDA</button>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <div class="stat-bar">
            <span>⏱️ <span id="timer">0s</span></span>
            <span>👤 <span id="current-user">---</span></span>
        </div>
        <div id="grid" class="grid"></div>
        <button id="reset" class="btn" style="display:none; margin-top:20px; width:200px; background:var(--gold); color:#000;" onclick="resetGame()">REPETIR</button>
    </div>

<script>
    const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆', '🦓', '🦒', '🐘', '🦏', '🐪', '🐎', '🐏', '🦉', '🦇', '🦋', '🐢', '🦖', '🐙', '🐝', '🐬', '🦄', '🐲', '🦈', '🦞'];
    let cardsData = [], flipped = [], matches = 0, busy = false;
    let timerInterval, secs = 0, started = false, curPairs = 0, isNightmare = false, diffName = "";

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

    function showDifficulty() {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('difficulty-screen').style.display = 'flex';
        document.getElementById('game-container').style.display = 'none';
    }

    function setupGame(n, name, night = false) {
        curPairs = night ? 21 : n; isNightmare = night; diffName = name;
        matches = 0; secs = 0; started = false;
        clearInterval(timerInterval);
        
        const pName = document.getElementById('player-name').value || "Explorador";
        document.getElementById('current-user').textContent = pName;
        document.getElementById('timer').textContent = "0s";
        document.getElementById('difficulty-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('reset').style.display = 'none';
        
        let sel = [...icons].sort(() => 0.5 - Math.random()).slice(0, curPairs);
        cardsData = [...sel, ...sel].sort(() => Math.random() - 0.5);
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${night ? 6 : (n > 12 ? 5 : 4)}, 1fr)`;

        cardsData.forEach(icon => {
            const c = document.createElement('div');
            c.className = 'card';
            if(night) c.style.fontSize = '1.2rem';
            c.dataset.icon = icon;
            c.innerHTML = `<div class="card-face card-front">${icon}</div><div class="card-face card-back">🐾</div>`;
            c.onclick = () => flip(c);
            grid.appendChild(c);
        });
    }

    function flip(card) {
        if (busy || card.classList.contains('flipped')) return;
        if (!started) {
            started = true;
            timerInterval = setInterval(() => { secs++; document.getElementById('timer').textContent = secs + 's'; }, 1000);
        }
        card.classList.add('flipped');
        flipped.push(card);
        if (flipped.length === 2) checkMatch();
    }

    function checkMatch() {
        busy = true;
        const [c1, c2] = flipped;
        if (c1.dataset.icon === c2.dataset.icon) {
            matches++;
            flipped = []; busy = false;
            if (matches === curPairs) endGame();
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                if (isNightmare) shuffleNightmare();
                flipped = []; busy = false;
            }, 700);
        }
    }

    function shuffleNightmare() {
        const unflipped = Array.from(document.querySelectorAll('.card:not(.flipped)'));
        const contents = unflipped.map(c => c.dataset.icon).sort(() => Math.random() - 0.5);
        unflipped.forEach((card, i) => {
            card.dataset.icon = contents[i];
            card.querySelector('.card-front').textContent = contents[i];
        });
    }

    function endGame() {
        clearInterval(timerInterval);
        saveRecord(diffName, secs);
        setTimeout(() => {
            alert(`FANTÁSTICO! Você completou o nível ${diffName} em ${secs} segundos!`);
            document.getElementById('reset').style.display = 'block';
            showRanking();
        }, 500);
    }

    function saveRecord(diff, time) {
        const pName = document.getElementById('player-name').value || "Anônimo";
        let records = JSON.parse(localStorage.getItem('zoo_records')) || {};
        if (!records[diff] || time < records[diff].time) {
            records[diff] = { name: pName, time: time };
            localStorage.setItem('zoo_records', JSON.stringify(records));
        }
    }

    function showRanking() {
        const records = JSON.parse(localStorage.getItem('zoo_records')) || {};
        const content = document.getElementById('ranking-content');
        content.innerHTML = "";
        
        const levels = ['Explorador', 'Guardião', 'Mestre', 'Lenda'];
        levels.forEach(lvl => {
            const data = records[lvl] || { name: "---", time: "--" };
            content.innerHTML += `
                <div class="ranking-item">
                    <span><strong>${lvl}:</strong> ${data.name}</span>
                    <span style="color:var(--gold)">${data.time}s</span>
                </div>`;
        });
        document.getElementById('ranking-screen').style.display = 'flex';
        if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
    }

    function resetGame() { setupGame(curPairs, diffName, isNightmare); }
</script>
</body>
</html>
